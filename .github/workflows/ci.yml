# .github/workflows/ci.yml
name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
      # `dev` is a PEP 621 optional-dependency extra, not a PEP 735 group:
      # bare `uv sync --locked` installs runtime deps only. Use --extra dev
      # to get pytest/ruff/mypy.
      - run: uv sync --locked --extra dev
      - run: uv run --frozen pytest -q
      - run: uv run --frozen ruff check .
      - run: uv run --frozen mypy --strict src

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: verifiers/ts/package-lock.json

      # --- Install Anchore CLIs (pinned) ---
      - name: Install syft, grype, grant (pinned)
        env:
          SYFT_VERSION: v1.46.0
          GRYPE_VERSION: v0.115.0
          GRANT_VERSION: v0.6.8
        run: |
          curl -sSfL "https://raw.githubusercontent.com/anchore/syft/${SYFT_VERSION}/install.sh"  | sh -s -- -b "$HOME/.local/bin" "${SYFT_VERSION}"
          curl -sSfL "https://raw.githubusercontent.com/anchore/grype/${GRYPE_VERSION}/install.sh" | sh -s -- -b "$HOME/.local/bin" "${GRYPE_VERSION}"
          curl -sSfL "https://raw.githubusercontent.com/anchore/grant/${GRANT_VERSION}/install.sh" | sh -s -- -b "$HOME/.local/bin" "${GRANT_VERSION}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # --- Build + assert Python artifacts ---
      - run: uv build
      - name: Assert Python artifact contents
        run: |
          uv run --frozen python tools/assert_artifacts.py \
            --wheel dist/*.whl --sdist dist/*.tar.gz

      # --- Build + assert npm tarball ---
      - run: npm ci --prefix verifiers/ts
      - run: npm run build --prefix verifiers/ts
      - name: Assert npm tarball contents
        run: |
          (cd verifiers/ts && npm pack --json > /tmp/pack.json)
          uv run --frozen python tools/assert_artifacts.py --npm-pack-json /tmp/pack.json

      # --- SBOM (syft) for each ecosystem, runtime deps only ---
      - name: Generate SBOMs
        run: |
          uv sync --locked
          syft dir:.venv -o cyclonedx-json=sbom-python.cdx.json
          (cd verifiers/ts && npm ci --omit=dev)
          syft dir:verifiers/ts -o cyclonedx-json=sbom-npm.cdx.json

      # --- Vulnerability gate (grype): fail on High + Critical ---
      - name: Vulnerability scan (grype)
        run: |
          grype sbom:sbom-python.cdx.json --fail-on high
          grype sbom:sbom-npm.cdx.json --fail-on high

      # --- License gate (grant): permissive allow-list ---
      - name: License scan (grant)
        run: |
          grant check -c .grant.yaml sbom-python.cdx.json
          grant check -c .grant.yaml sbom-npm.cdx.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sboms
          path: |
            sbom-python.cdx.json
            sbom-npm.cdx.json
