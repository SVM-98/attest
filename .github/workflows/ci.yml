# .github/workflows/ci.yml
name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.21"
      # `dev` is a PEP 621 optional-dependency extra, not a PEP 735 group:
      # bare `uv sync --frozen` installs runtime deps only. Use --extra dev
      # to get pytest/ruff/mypy.
      - run: uv sync --frozen --extra dev
      - run: uv run pytest -q
      - run: uv run ruff check .
      - run: uv run mypy --strict src

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.21"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: verifiers/ts/package-lock.json

      # --- Install Anchore CLIs (pinned) ---
      - name: Install syft, grype, grant
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh  | sh -s -- -b "$HOME/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b "$HOME/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/grant/main/install.sh | sh -s -- -b "$HOME/.local/bin" v0.6.8
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # --- Build + assert Python artifacts ---
      - run: uv build
      - name: Assert Python artifact contents
        run: |
          uv run python tools/assert_artifacts.py \
            --wheel dist/*.whl --sdist dist/*.tar.gz

      # --- Build + assert npm tarball ---
      - run: npm ci --prefix verifiers/ts
      - run: npm run build --prefix verifiers/ts
      - name: Assert npm tarball contents
        run: |
          (cd verifiers/ts && npm pack --json > /tmp/pack.json)
          uv run python tools/assert_artifacts.py --npm-pack-json /tmp/pack.json

      # --- SBOM (syft) for each ecosystem, runtime deps only ---
      - name: Generate SBOMs
        run: |
          uv sync --frozen
          syft dir:.venv -o cyclonedx-json=sbom-python.cdx.json
          (cd verifiers/ts && npm ci --omit=dev)
          syft dir:verifiers/ts -o cyclonedx-json=sbom-npm.cdx.json

      # --- Vulnerability gate (grype): fail on High + Critical ---
      - name: Vulnerability scan (grype)
        run: |
          grype sbom:sbom-python.cdx.json --fail-on high
          grype sbom:sbom-npm.cdx.json --fail-on high

      # --- License gate (grant): permissive allow-list ---
      - name: License scan (grant)
        run: |
          grant check -c .grant.yaml sbom-python.cdx.json
          grant check -c .grant.yaml sbom-npm.cdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: |
            sbom-python.cdx.json
            sbom-npm.cdx.json
